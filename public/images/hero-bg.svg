  </defs>
  <rect width="1600" height="900" fill="url(#hsky)"/>
  <ellipse cx="800" cy="750" rx="900" ry="200" fill="#5a9e4f" opacity="0.4"/>
  <rect x="300" y="450" width="600" height="200" rx="4" fill="url(#hpool)"/>
  <rect x="900" y="400" width="400" height="300" rx="2" fill="#001F3F" opacity="0.15"/>
