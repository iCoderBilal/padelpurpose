<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Hamptons estate at golden hour">
  <defs>
    <linearGradient id="hsky" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="40%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#F9F9F2"/>
    </linearGradient>
    <linearGradient id="hpool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0077B6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#001F3F" stop-opacity="0.4"/>
